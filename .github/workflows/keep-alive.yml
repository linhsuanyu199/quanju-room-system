name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 3 */3 * *'  # 每 3 天跑一次，避免 Supabase 免費專案 7 天無流量自動暫停
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
            "https://cvryjcdcrebdnlemgabs.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
